version: '3.8'

services:
  guru-app:
    image: node:22-alpine
    container_name: guru-2-app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=guru_secret_key_2026_test_manus_deployment
      - ADMIN_EMAIL=admin@raphaguru.com
      - ADMIN_PASSWORD=Admin@2024
      - SUPERADMIN_BOOTSTRAP_USER=superadmin
      - SUPERADMIN_BOOTSTRAP_PASSWORD=TroqueAgora!2026
      - SUPERADMIN_BOOTSTRAP_CODE=246810
      - SUPERADMIN_COOKIE_NAME=rg_superadmin
      - SUPERADMIN_SESSION_TTL_MINUTES=480
      - SUPERADMIN_REQUIRE_PASSWORD_CHANGE=true
    command: node dist/index.js
    restart: always
    networks:
      - guru-network

  nginx:
    image: nginx:alpine
    container_name: guru-2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - guru-app
    restart: always
    networks:
      - guru-network

networks:
  guru-network:
    driver: bridge

volumes:
  guru-data:
    driver: local
